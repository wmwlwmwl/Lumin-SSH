name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev libglib2.0-dev \
            libc6-dev libayatana-appindicator3-dev

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend dependencies
        run: npm install
        working-directory: frontend

      - name: Build Wails
        run: |
          export PATH=$HOME/go/bin:$PATH
          wails build -clean -tags webkit2_41 -o Lumin
          echo "binary=${{ github.workspace }}/build/bin/Lumin" >> $GITHUB_ENV

      - name: Package .deb
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          mkdir -p build/deb/usr/bin
          cp build/bin/Lumin build/deb/usr/bin/lumin
          sudo chown root:root build/deb/usr/bin/lumin
          sudo dpkg-deb --root-owner-group --build build/deb build/lumin_${VERSION}_amd64.deb
          sha256sum build/lumin_${VERSION}_amd64.deb > build/lumin_${VERSION}_amd64.deb.sha256
          echo "deb=${{ github.workspace }}/build/lumin_${VERSION}_amd64.deb" >> $GITHUB_ENV
          echo "deb_sha=${{ github.workspace }}/build/lumin_${VERSION}_amd64.deb.sha256" >> $GITHUB_ENV

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.binary }}
            ${{ env.deb }}
            ${{ env.deb_sha }}

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend dependencies
        run: npm install
        working-directory: frontend

      - name: Wails Doctor
        run: |
          export PATH=$HOME/go/bin:$PATH
          wails doctor

      - name: Build Wails
        run: |
          export PATH=$HOME/go/bin:$PATH
          wails build -clean -o Lumin

      - name: Package .app to .zip
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          cp -r build/bin/Lumin.app build/Lumin.app
          ditto -c -k --sequesterRsrc --keepParent build/Lumin.app build/Lumin-${VERSION}.zip
          sha256sum build/Lumin-${VERSION}.zip > build/Lumin-${VERSION}.zip.sha256
          echo "app_zip=${{ github.workspace }}/build/Lumin-${VERSION}.zip" >> $GITHUB_ENV
          echo "app_sha=${{ github.workspace }}/build/Lumin-${VERSION}.zip.sha256" >> $GITHUB_ENV

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.app_zip }}
            ${{ env.app_sha }}

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend dependencies
        run: npm install
        working-directory: frontend

      - name: Build Wails
        run: |
          $env:PATH = "$env:USERPROFILE\go\bin;" + $env:PATH
          wails build -clean -o Lumin.exe

      - name: Package
        shell: pwsh
        run: |
          $VERSION = "$env:GITHUB_REF_NAME" -replace "^v", ""
          Compress-Archive -Path build/bin/Lumin.exe -DestinationPath "build/Lumin-$VERSION-portable.zip"
          CertUtil -hashfile "build/Lumin-$VERSION-portable.zip" SHA256 | Out-File -FilePath "build/Lumin-$VERSION-portable.zip.sha256" -Encoding ascii
          echo "portable=${{ github.workspace }}\build\Lumin-$VERSION-portable.zip" >> $env:GITHUB_ENV
          echo "portable_sha=${{ github.workspace }}\build\Lumin-$VERSION-portable.zip.sha256" >> $env:GITHUB_ENV

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.portable }}
            ${{ env.portable_sha }}
